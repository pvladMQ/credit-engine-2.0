# ============================================================================
# Default (common) configuration. The active profile selects the backing stack:
#   - cloud : real bound services on Tanzu Platform (set via SPRING_PROFILES_ACTIVE)
#   - local : H2 + in-memory cache + in-process queue + stub AI (no external deps)
# Bare runs (no active profile) fall back to 'local'.
# ============================================================================
spring:
  application:
    name: credit-engine-2.0
  profiles:
    default: local
  # Placeholder so Spring AI's OpenAI auto-config bootstraps even without a real key
  # (the cloud profile overrides this from the credit-chat binding; local never calls out).
  ai:
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:not-set}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

credit-engine:
  queue:
    name: application-requests

logging:
  level:
    com.tanzu.creditengine: INFO
    org.springframework.amqp: WARN

---
# ============================================================================
# LOCAL profile — frontend inspection only. No Postgres / Valkey / RabbitMQ / GenAI.
# ============================================================================
spring:
  config:
    activate:
      on-profile: local

  # Don't auto-connect to Redis or RabbitMQ when running locally.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

  datasource:
    url: jdbc:h2:mem:creditdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true

---
# ============================================================================
# CLOUD profile — Tanzu Platform for Cloud Foundry.
#
# The Tanzu Java buildpack injects 'spring-cloud-bindings' on the classpath and uses it
# to auto-configure spring.datasource (PostgreSQL), spring.data.redis (Valkey) and
# spring.rabbitmq from the bound services in VCAP_SERVICES. We deliberately DO NOT set
# those properties here — letting the binding own them avoids credential field-name
# mismatches (e.g. the Postgres binding uses 'user', not 'username') and the 'hosts'
# array, and prevents precedence conflicts with the buildpack binding.
#
# IMPORTANT: do not bundle spring-cloud-bindings in pom.xml — a second copy on the
# classpath crashes the app during environment post-processing at startup.
# ============================================================================
spring:
  config:
    activate:
      on-profile: cloud

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    listener:
      simple:
        # Bounded concurrency so a burst of messages can't spawn unbounded work
        # and spike CPU. Tune per instance size.
        concurrency: 2
        max-concurrency: 4
        prefetch: 10

  # Tanzu GenAI 'credit-chat' exposes an OpenAI-compatible API. The GenAI tile binding is
  # not auto-mapped by spring-cloud-bindings, so map it explicitly from VCAP_SERVICES.
  # Credential key names depend on the GenAI tile; adjust if your binding differs.
  ai:
    openai:
      api-key: ${vcap.services.credit-chat.credentials.api_key:not-set}
      base-url: ${vcap.services.credit-chat.credentials.api_base:https://api.openai.com}
      chat:
        options:
          model: ${vcap.services.credit-chat.credentials.model_name:gpt-4o-mini}
