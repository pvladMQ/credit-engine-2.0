---
applications:
  - name: credit-engine-v2
    memory: 1G
    disk_quota: 2G
    instances: 1
    path: target/credit-engine-v2.jar
    buildpacks:
      - java_buildpack_offline
    env:
      JAVA_OPTS: -Djava.security.egd=file:///dev/urandom
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 17.+ } }'
      SPRING_PROFILES_ACTIVE: cloud
    # Services (credit-db, credit-msg, credit-cache) bound automatically to the app
    # Note: credit-cache is bound to a Valkey instance
    services:
      - credit-db
      - credit-msg
      - credit-cache
      - credit-chat
    # Random route ensures a unique public URL (e.g., credit-engine-v2-brave-lion-xs.cfapps.io)
    random-route: true
    # Process health-check: CF only verifies the app process is alive. This prevents a
    # transient DOWN reading from an optional dependency's /actuator/health indicator
    # (Valkey/RabbitMQ) from crash-looping the app. Switch back to 'http' with
    # health-check-http-endpoint: /actuator/health if you want endpoint-level checks.
    health-check-type: process
    timeout: 180
